services:
  # ═══════════════════════════════════════════════════════════════
  # STAGEZERO APPLICATION
  # ═══════════════════════════════════════════════════════════════
  debug-stagezero:
    container_name: debug-stagezero
    image: stagezero:debug
    build:
      context: .
      dockerfile: StageZero/Dockerfile
      target: debug  # Change to 'release' for production
    ports:
      - "5000:443"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:443
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      # Database path is now managed by DataPathService in the application
      # The application will use platform-specific paths automatically
    volumes:
      # Source code mounts for hot reload (debug only)
      - ./StageZero:/src/StageZero
      - ./StageZero.ReverseProxy:/src/StageZero.ReverseProxy
      - ./Lifted.BlazorAuth.Basic:/src/Lifted.BlazorAuth.Basic

    
      - ${STAGEZERO_DATA_DIR:-./.volumes/stagezero-data}:/app-data

      # HTTPS development certificate
      - ~/.aspnet/https:/https:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
